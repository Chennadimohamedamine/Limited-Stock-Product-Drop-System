version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16
    container_name: limited-stock-postgres
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: testdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - limited-stock-network

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: limited-stock-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://test:test@postgres:5432/testdb
      JWT_SECRET: test-secret-key-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    networks:
      - limited-stock-network
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 5 &&
        echo 'Running non-interactive migrations...' &&
        npm run db:migrate -- --skip-generate || npm run db:push &&
        echo 'Seeding database...' &&
        npm run db:seed || true &&
        echo 'Starting server...' &&
        npm run dev
      "

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: limited-stock-frontend
    environment:
      VITE_API_URL: http://backend:3000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    networks:
      - limited-stock-network
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:

networks:
  limited-stock-network:
    driver: bridge
